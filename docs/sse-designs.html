<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSE Pipeline Designs — veriel-ops</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #222222;
      --border: #2a2a2a;
      --border-hover: #3a3a3a;
      --text-primary: #ededed;
      --text-secondary: #a1a1a1;
      --text-tertiary: #666666;
      --success: #2ea043;
      --success-bg: rgba(46, 160, 67, 0.08);
      --warning: #d29922;
      --warning-bg: rgba(210, 153, 34, 0.06);
      --error: #f85149;
      --env-des: #3b82f6;
      --env-pre: #eab308;
      --env-pro: #22c55e;
      --accent: #58a6ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      padding: 40px 24px;
      line-height: 1.5;
    }

    .page-header {
      max-width: 1400px;
      margin: 0 auto 48px;
      text-align: center;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .designs {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 32px;
    }

    .design-col {
      min-width: 0;
    }

    .design-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }

    .design-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    /* ─── Shared icon helpers ─── */
    .icon-check {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--success);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-check svg { width: 10px; height: 10px; }

    .icon-running {
      width: 18px; height: 18px;
      border: 2px solid var(--warning);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    .icon-pending {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border-hover);
      flex-shrink: 0;
    }

    .icon-error {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--error);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-error svg { width: 10px; height: 10px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ═══════════════════════════════════════════
       DESIGN 1 — Current (Vercel-inspired)
       ═══════════════════════════════════════════ */

    .d1-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .d1-header h3 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .d1-header .time {
      font-size: 12px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .d1-progress {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .d1-progress-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--success);
      transition: width 0.5s;
    }

    .d1-progress-fill.running {
      background: var(--warning);
    }

    .d1-connector {
      width: 2px;
      height: 20px;
      margin: 0 auto;
    }

    .d1-connector.done { background: rgba(46, 160, 67, 0.4); }
    .d1-connector.pending { background: var(--border); }

    .d1-job {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .d1-job.running { border-color: rgba(210, 153, 34, 0.3); background: var(--warning-bg); }
    .d1-job.success { border-color: var(--border); }
    .d1-job.pending { border-color: var(--border); opacity: 0.6; }

    .d1-job-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
    }

    .d1-job-header:hover { background: rgba(255,255,255,0.02); }

    .d1-job-header .label {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
    }

    .d1-job-header .meta {
      font-size: 11px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .d1-job-header .chevron {
      width: 16px; height: 16px;
      color: var(--text-tertiary);
      transition: transform 0.2s;
    }

    .d1-job.open .chevron { transform: rotate(90deg); }

    .d1-steps {
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }

    .d1-step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px 10px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;
    }

    .d1-step:last-child { border-bottom: none; }
    .d1-step:hover { background: rgba(255,255,255,0.02); }

    .d1-step .icon { width: 16px; height: 16px; }
    .d1-step .icon-check, .d1-step .icon-running, .d1-step .icon-pending {
      width: 16px; height: 16px;
    }

    .d1-step .step-label {
      font-size: 12px;
      color: var(--text-secondary);
      flex: 1;
    }

    .d1-step .step-detail {
      font-size: 11px;
      color: var(--text-tertiary);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .d1-step .step-time {
      font-size: 11px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    /* Log block */
    .d1-logs {
      margin: 0 16px 10px 28px;
      border-radius: 6px;
      background: #0d1117;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.7;
      color: #c9d1d9;
      overflow-x: auto;
    }

    .d1-logs .line {
      display: flex;
    }

    .d1-logs .ln {
      color: #484f58;
      user-select: none;
      width: 24px;
      text-align: right;
      margin-right: 12px;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════
       DESIGN 2 — Railway-style
       ═══════════════════════════════════════════ */

    .d2-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .d2-header h3 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .d2-header .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--success);
      color: white;
    }

    .d2-header .badge.running {
      background: var(--warning);
    }

    .d2-rail {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }

    .d2-job-box {
      position: relative;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-card);
      transition: all 0.2s;
    }

    .d2-job-box.success {
      border-left: 3px solid var(--success);
    }

    .d2-job-box.running {
      border-left: 3px solid var(--warning);
      background: var(--warning-bg);
    }

    .d2-job-box.pending {
      border-left: 3px solid var(--border-hover);
      opacity: 0.5;
    }

    .d2-job-box.error {
      border-left: 3px solid var(--error);
    }

    .d2-job-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .d2-job-top .name {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
    }

    .d2-job-top .time {
      font-size: 11px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .d2-job-progress {
      height: 4px;
      border-radius: 2px;
      background: var(--bg-tertiary);
      overflow: hidden;
      margin-bottom: 10px;
    }

    .d2-job-progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--success);
      transition: width 0.5s;
    }

    .d2-job-progress-fill.running {
      background: var(--warning);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .d2-steps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .d2-step-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--bg-secondary);
      border: 1px solid transparent;
      font-size: 11px;
      color: var(--text-secondary);
      transition: all 0.15s;
      cursor: pointer;
    }

    .d2-step-chip:hover {
      border-color: var(--border-hover);
      background: var(--bg-tertiary);
    }

    .d2-step-chip .chip-icon {
      width: 14px; height: 14px;
    }

    .d2-step-chip .chip-icon .icon-check,
    .d2-step-chip .chip-icon .icon-running,
    .d2-step-chip .chip-icon .icon-pending {
      width: 14px; height: 14px;
    }

    .d2-step-chip .chip-label { flex: 1; }

    .d2-step-chip .chip-time {
      font-size: 10px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .d2-track {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      position: relative;
    }

    .d2-track-line {
      width: 2px;
      height: 100%;
      background: var(--success);
      opacity: 0.4;
    }

    .d2-track-line.pending {
      background: var(--border);
      opacity: 1;
    }

    .d2-track-dot {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .d2-track-dot.pending {
      background: var(--border-hover);
    }

    /* ═══════════════════════════════════════════
       DESIGN 3 — GitHub Actions-style
       ═══════════════════════════════════════════ */

    .d3-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .d3-header h3 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .d3-header .run-id {
      font-size: 12px;
      color: var(--accent);
      font-family: 'SF Mono', monospace;
    }

    .d3-header .time {
      font-size: 12px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    /* Graph layout like GitHub */
    .d3-graph {
      display: flex;
      align-items: flex-start;
      gap: 0;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    .d3-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 120px;
      cursor: pointer;
      position: relative;
    }

    .d3-node-box {
      padding: 8px 14px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg-secondary);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: center;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .d3-node-box.success {
      border-color: var(--success);
      color: var(--text-primary);
    }

    .d3-node-box.running {
      border-color: var(--warning);
      color: var(--text-primary);
      box-shadow: 0 0 0 3px rgba(210, 153, 34, 0.15);
    }

    .d3-node-box.error {
      border-color: var(--error);
      color: var(--text-primary);
    }

    .d3-node-box.selected {
      background: var(--bg-tertiary);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .d3-node .d3-node-status {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .d3-node .d3-node-time {
      font-size: 10px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .d3-edge {
      display: flex;
      align-items: center;
      padding-top: 12px;
    }

    .d3-edge-line {
      width: 32px;
      height: 2px;
      background: var(--border);
    }

    .d3-edge-line.done {
      background: var(--success);
      opacity: 0.5;
    }

    .d3-edge-arrow {
      width: 0; height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 6px solid var(--border);
    }

    .d3-edge-arrow.done {
      border-left-color: var(--success);
      opacity: 0.5;
    }

    /* Step detail panel */
    .d3-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .d3-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
    }

    .d3-panel-header .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 8px;
      background: var(--success);
      color: white;
      margin-left: auto;
    }

    .d3-step-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.1s;
    }

    .d3-step-row:last-child { border-bottom: none; }
    .d3-step-row:hover { background: rgba(255,255,255,0.02); }

    .d3-step-row .icon-check, .d3-step-row .icon-running, .d3-step-row .icon-pending {
      width: 15px; height: 15px;
    }

    .d3-step-row .step-name { flex: 1; }

    .d3-step-row .step-time {
      font-size: 11px;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    /* ─── Result summary card ─── */
    .result-card {
      margin-top: 16px;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid rgba(46, 160, 67, 0.2);
      background: var(--success-bg);
    }

    .result-card h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--success);
      margin-bottom: 8px;
    }

    .result-card p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .result-card .val {
      color: var(--accent);
    }

    .result-card code {
      font-family: 'SF Mono', monospace;
      font-size: 11px;
      color: var(--text-primary);
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ─── Tabs for switching views ─── */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-tertiary);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn:hover { color: var(--text-secondary); }

    .tab-btn.active {
      color: var(--text-primary);
      border-bottom-color: var(--text-primary);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>SSE Pipeline — Design Comparison</h1>
    <p>3 estilos de timeline para la creaci&oacute;n de proyectos en veriel-ops</p>
  </div>

  <div class="tab-bar" id="tabs">
    <button class="tab-btn active" data-tab="all">Todos</button>
    <button class="tab-btn" data-tab="d1">1. Actual (Vercel)</button>
    <button class="tab-btn" data-tab="d2">2. Railway</button>
    <button class="tab-btn" data-tab="d3">3. GitHub Actions</button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->

  <div class="tab-content active" id="tab-all">
    <div class="designs">

      <!-- ─── DESIGN 1: Current ─── -->
      <div class="design-col">
        <div class="design-label">Dise&ntilde;o 1</div>
        <div class="design-title">Actual (Vercel-style)</div>
        <div class="card" id="design1-all"></div>
      </div>

      <!-- ─── DESIGN 2: Railway ─── -->
      <div class="design-col">
        <div class="design-label">Dise&ntilde;o 2</div>
        <div class="design-title">Railway-style</div>
        <div class="card" id="design2-all"></div>
      </div>

      <!-- ─── DESIGN 3: GitHub Actions ─── -->
      <div class="design-col">
        <div class="design-label">Dise&ntilde;o 3</div>
        <div class="design-title">GitHub Actions</div>
        <div class="card" id="design3-all"></div>
      </div>

    </div>
  </div>

  <div class="tab-content" id="tab-d1">
    <div style="max-width: 560px; margin: 0 auto;">
      <div class="design-label">Dise&ntilde;o 1</div>
      <div class="design-title">Actual (Vercel-style)</div>
      <div class="card" id="design1-solo"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-d2">
    <div style="max-width: 560px; margin: 0 auto;">
      <div class="design-label">Dise&ntilde;o 2</div>
      <div class="design-title">Railway-style</div>
      <div class="card" id="design2-solo"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-d3">
    <div style="max-width: 640px; margin: 0 auto;">
      <div class="design-label">Dise&ntilde;o 3</div>
      <div class="design-title">GitHub Actions</div>
      <div class="card" id="design3-solo"></div>
    </div>
  </div>

  <script>
    // ─── Shared mock data ───────────────────────────────────────
    const pipeline = {
      title: "Deploy demo-app",
      totalDuration: "1m 47s",
      jobs: [
        {
          id: "setup-repo",
          label: "Setup Repository",
          status: "success",
          duration: "9.9s",
          steps: [
            { label: "Create repository", status: "success", detail: "veriel-cloud/demo-app", duration: "4.3s" },
            { label: "Add CI/CD workflows", status: "success", detail: "5 workflow callers", duration: "4.5s" },
            { label: "Create develop branch", status: "success", detail: "develop \u2190 main", duration: "900ms" },
          ],
        },
        {
          id: "infra",
          label: "Configure Infrastructure",
          status: "success",
          duration: "8.3s",
          steps: [
            { label: "Create Cloudflare Pages project", status: "success", detail: "demo-app.pages.dev", duration: "4.1s" },
            { label: "Setup DNS records", status: "success", detail: "3 CNAME records", duration: "1.0s" },
            { label: "Assign custom domains", status: "success", detail: "dev, pre, pro", duration: "4.1s" },
          ],
        },
        {
          id: "deploy-des",
          label: "Deploy DES (GitHub Actions)",
          status: "success",
          duration: "1m 28s",
          steps: [
            { label: "Set up job", status: "success", duration: "2s" },
            { label: "Checkout", status: "success", duration: "1s" },
            { label: "Setup pnpm", status: "success", duration: "3s" },
            { label: "Setup Node.js", status: "success", duration: "4s" },
            { label: "Install dependencies", status: "success", duration: "12s" },
            { label: "Build", status: "success", duration: "16s" },
            { label: "Generate build metadata", status: "success", duration: "1s" },
            { label: "Create build archive", status: "success", duration: "1s" },
            { label: "Upload build artifact", status: "success", duration: "2s" },
            { label: "Deploy to Cloudflare Pages", status: "success", duration: "32s" },
            { label: "Store build in R2", status: "success", duration: "5s" },
            { label: "Complete job", status: "success", duration: "0s" },
          ],
        },
      ],
    };

    // ─── Icon helpers ───────────────────────────────────────────
    function iconSvg(status, size = 18) {
      if (status === "success") {
        return `<div class="icon-check" style="width:${size}px;height:${size}px">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5l10-10"/></svg>
        </div>`;
      }
      if (status === "running") {
        return `<div class="icon-running" style="width:${size}px;height:${size}px"></div>`;
      }
      if (status === "error") {
        return `<div class="icon-error" style="width:${size}px;height:${size}px">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6l-12 12"/><path d="M6 6l12 12"/></svg>
        </div>`;
      }
      return `<div class="icon-pending" style="width:${size}px;height:${size}px"></div>`;
    }

    const chevronSvg = `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>`;

    // ─── DESIGN 1: Current (Vercel) ─────────────────────────────
    function renderDesign1(container) {
      let html = `
        <div class="d1-header">
          ${iconSvg("success")}
          <h3>${pipeline.title}</h3>
          <span class="time">${pipeline.totalDuration}</span>
        </div>
        <div class="d1-progress">
          <div class="d1-progress-fill" style="width:100%"></div>
        </div>
      `;

      pipeline.jobs.forEach((job, i) => {
        if (i > 0) {
          html += `<div class="d1-connector done"></div>`;
        }

        const isOpen = job.id === "deploy-des";
        html += `
          <div class="d1-job ${job.status} ${isOpen ? 'open' : ''}" data-job="${job.id}">
            <div class="d1-job-header" onclick="this.parentElement.classList.toggle('open')">
              ${iconSvg(job.status)}
              <span class="label">${job.label}</span>
              <span class="meta">${job.duration}</span>
              ${chevronSvg}
            </div>
            <div class="d1-steps" style="display:${isOpen ? 'block' : 'none'}">
              ${job.steps.map((step, si) => `
                <div class="d1-step" onclick="toggleD1Logs(this)">
                  ${iconSvg(step.status, 16)}
                  <span class="step-label">${step.label}</span>
                  ${step.detail ? `<span class="step-detail">${step.detail}</span>` : ''}
                  <span class="step-time">${step.duration}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;

      // Toggle steps on job header click
      container.querySelectorAll('.d1-job-header').forEach(h => {
        h.addEventListener('click', () => {
          const steps = h.nextElementSibling;
          steps.style.display = steps.style.display === 'none' ? 'block' : 'none';
        });
      });
    }

    // ─── DESIGN 2: Railway ──────────────────────────────────────
    function renderDesign2(container) {
      let html = `
        <div class="d2-header">
          ${iconSvg("success")}
          <h3>${pipeline.title}</h3>
          <span class="badge">Complete</span>
          <span style="font-size:11px;color:var(--text-tertiary)">${pipeline.totalDuration}</span>
        </div>
        <div class="d2-rail">
      `;

      pipeline.jobs.forEach((job, i) => {
        if (i > 0) {
          html += `
            <div class="d2-track">
              <div class="d2-track-line ${job.status === 'pending' ? 'pending' : ''}"></div>
              <div class="d2-track-dot ${job.status === 'pending' ? 'pending' : ''}"></div>
            </div>
          `;
        }

        const completedSteps = job.steps.filter(s => s.status === "success").length;
        const progressPct = (completedSteps / job.steps.length) * 100;

        html += `
          <div class="d2-job-box ${job.status}">
            <div class="d2-job-top">
              ${iconSvg(job.status, 16)}
              <span class="name">${job.label}</span>
              <span class="time">${job.duration}</span>
            </div>
            <div class="d2-job-progress">
              <div class="d2-job-progress-fill ${job.status === 'running' ? 'running' : ''}" style="width:${progressPct}%"></div>
            </div>
            <div class="d2-steps-grid">
              ${job.steps.map(step => `
                <div class="d2-step-chip">
                  <span class="chip-icon">${iconSvg(step.status, 14)}</span>
                  <span class="chip-label">${step.label}</span>
                  <span class="chip-time">${step.duration}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });

      html += `</div>`;
      container.innerHTML = html;
    }

    // ─── DESIGN 3: GitHub Actions ───────────────────────────────
    function renderDesign3(container) {
      let html = `
        <div class="d3-header">
          ${iconSvg("success")}
          <h3>${pipeline.title}</h3>
          <span class="run-id">#23515059424</span>
          <span class="time">${pipeline.totalDuration}</span>
        </div>
      `;

      // Job graph (horizontal node diagram)
      html += `<div class="d3-graph">`;
      pipeline.jobs.forEach((job, i) => {
        if (i > 0) {
          html += `
            <div class="d3-edge">
              <div class="d3-edge-line ${job.status !== 'pending' ? 'done' : ''}"></div>
              <div class="d3-edge-arrow ${job.status !== 'pending' ? 'done' : ''}"></div>
            </div>
          `;
        }
        html += `
          <div class="d3-node" onclick="selectD3Job('${job.id}', this.closest('.card'))">
            <div class="d3-node-box ${job.status} ${i === 2 ? 'selected' : ''}" data-job="${job.id}">
              ${job.label}
            </div>
            <div class="d3-node-status">
              ${iconSvg(job.status, 14)}
              <span class="d3-node-time">${job.duration}</span>
            </div>
          </div>
        `;
      });
      html += `</div>`;

      // Step detail panel (showing deploy-des by default)
      pipeline.jobs.forEach(job => {
        html += `
          <div class="d3-panel" data-panel="${job.id}" style="display:${job.id === 'deploy-des' ? 'block' : 'none'}">
            <div class="d3-panel-header">
              ${iconSvg(job.status, 16)}
              ${job.label}
              <span class="badge">${job.duration}</span>
            </div>
            ${job.steps.map(step => `
              <div class="d3-step-row">
                ${iconSvg(step.status, 15)}
                <span class="step-name">${step.label}</span>
                ${step.detail ? `<span style="font-size:11px;color:var(--text-tertiary);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${step.detail}</span>` : ''}
                <span class="step-time">${step.duration}</span>
              </div>
            `).join('')}
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function selectD3Job(jobId, card) {
      card.querySelectorAll('.d3-node-box').forEach(n => n.classList.remove('selected'));
      card.querySelector(`.d3-node-box[data-job="${jobId}"]`).classList.add('selected');
      card.querySelectorAll('.d3-panel').forEach(p => p.style.display = 'none');
      card.querySelector(`.d3-panel[data-panel="${jobId}"]`).style.display = 'block';
    }

    // ─── Tab switching ──────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    // ─── Render all ─────────────────────────────────────────────
    renderDesign1(document.getElementById('design1-all'));
    renderDesign1(document.getElementById('design1-solo'));
    renderDesign2(document.getElementById('design2-all'));
    renderDesign2(document.getElementById('design2-solo'));
    renderDesign3(document.getElementById('design3-all'));
    renderDesign3(document.getElementById('design3-solo'));
  </script>
</body>
</html>
